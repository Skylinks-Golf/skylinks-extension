<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      width: 260px;
      background: #fff;
    }
    .header {
      background: #0f172a;
      color: #fff;
      padding: 14px 16px;
    }
    .header h1 { font-size: 14px; font-weight: 700; }
    .header p  { font-size: 11px; color: #94a3b8; margin-top: 2px; }
    .body { padding: 14px 16px; }
    .btn {
      display: block;
      width: 100%;
      padding: 11px 14px;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      text-align: left;
    }
    .btn-blue  { background: #2563eb; color: #fff; }
    .btn-green { background: #16a34a; color: #fff; margin-top: 10px; }
    .btn:hover { opacity: 0.9; }
    .hint {
      font-size: 11px;
      color: #94a3b8;
      margin-top: 10px;
      line-height: 1.5;
      text-align: center;
    }
    .error {
      font-size: 12px;
      color: #dc2626;
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: 6px;
      padding: 10px 12px;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Skylinks Tools</h1>
    <p>Lightspeed Retail &amp; Golf</p>
  </div>
  <div class="body" id="body"></div>
  <script src="popup.js"></script>
</body>
</html>
