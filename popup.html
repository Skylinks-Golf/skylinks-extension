<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      width: 260px;
      background: #fff;
    }
    .header {
      background: #262b2f;
      color: #fff;
      padding: 14px 16px;
      border-bottom: 3px solid #eeb02b;
    }
    .header h1 { font-size: 14px; font-weight: 700; font-family: "Trebuchet MS", "Segoe UI", Tahoma, sans-serif; }
    .header p  { font-size: 11px; color: #94a3b8; margin-top: 2px; }
    .body { padding: 14px 16px; }
    .btn {
      display: block;
      width: 100%;
      padding: 11px 14px;
      border: none;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      text-align: left;
      background: #eeb02b;
      color: #1c1b19;
      margin-top: 10px;
    }
    .btn:first-child { margin-top: 0; }
    .btn:hover { background: #ca9625; }
    .btn-blue, .btn-green, .btn-purple, .btn-orange, .btn-teal { }
    .hint {
      font-size: 11px;
      color: #94a3b8;
      margin-top: 10px;
      line-height: 1.5;
      text-align: center;
    }
    .error {
      font-size: 12px;
      color: #dc2626;
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: 6px;
      padding: 10px 12px;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Skylinks Tools</h1>
    <p>Skylinks Golf Club</p>
  </div>
  <div class="body" id="body"></div>
  <script src="popup.js"></script>
</body>
</html>
